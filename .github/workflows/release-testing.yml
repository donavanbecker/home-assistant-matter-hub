name: Release Testing

on:
  workflow_dispatch:
  push:
    branches:
      - testing

permissions:
  contents: read

jobs:
  release:
    permissions:
      contents: write
      packages: write
      id-token: write
      issues: write
    name: Perform Testing Release
    runs-on: ubuntu-latest
    outputs:
      node-version: ${{ steps.setup.outputs.node-version }}
      release-version: ${{ steps.version.outputs.release-version }}
      release-channel: testing
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Environment
        id: setup
        uses: ./.github/actions/setup-node

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint
      - name: Test
        run: pnpm run test
      - name: Calculate Next Testing Version
        id: version
        run: |
          # Get latest testing tag (only 4.1.0-testing.X pattern)
          LATEST_TESTING=$(git tag -l "v4.1.0-testing.*" --sort=-v:refname | head -n1)
          echo "Latest testing tag: $LATEST_TESTING"
          
          if [ -z "$LATEST_TESTING" ]; then
            # No testing tag exists, start with testing.1
            NEXT_VERSION="4.1.0-testing.1"
          else
            # Parse existing testing version and increment only the testing number
            TESTING_NUM=${LATEST_TESTING##*-testing.}
            NEXT_VERSION="4.1.0-testing.$((TESTING_NUM + 1))"
          fi
          
          echo "Next version: $NEXT_VERSION"
          echo "release-version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Update Package Versions
        run: |
          VERSION="${{ steps.version.outputs.release-version }}"
          pnpm run release:version "$VERSION"

      - name: Build with Version
        run: pnpm run build
        env:
          BASE_URL: /home-assistant-matter-hub
          APP_VERSION: ${{ steps.version.outputs.release-version }}

      - name: Package
        run: pnpm run release:pack

      - name: Create Git Tag
        run: |
          VERSION="${{ steps.version.outputs.release-version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Changelog
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.release-version }}"
          # Get commits since last testing tag
          LATEST_TESTING=$(git tag -l "v4.1.0-testing.*" --sort=-v:refname | grep -v "v$VERSION" | head -n1)
          
          if [ -n "$LATEST_TESTING" ]; then
            echo "Generating changelog from $LATEST_TESTING to HEAD"
            COMMITS=$(git log --pretty=format:"- %s (%h)" "$LATEST_TESTING"..HEAD 2>/dev/null || git log --pretty=format:"- %s (%h)" -10)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" -10)
          fi
          
          # Create CHANGELOG.md
          {
            echo "# v$VERSION"
            echo ""
            echo "## Changes"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "---"
            echo "⚠️ **This is a testing release** - use at your own risk!"
          } > CHANGELOG.md
          
          # Create CHANGELOG_FULL.md (same content for testing)
          cp CHANGELOG.md CHANGELOG_FULL.md
          
          # Store for release notes
          {
            echo "CHANGELOG<<EOF"
            echo "$COMMITS"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.release-version }}"
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --notes-file CHANGELOG.md \
            --prerelease \
            CHANGELOG_FULL.md

      - name: Package Artifact
        uses: actions/upload-artifact@v5
        with:
          name: package.tgz
          path: apps/home-assistant-matter-hub/package.tgz

  prepare-docker:
    name: "Prepare Docker"
    runs-on: ubuntu-latest
    outputs:
      dockerfiles: ${{ steps.dockerfiles.outputs.dockerfiles }}
    steps:
      - uses: actions/checkout@v6
      - name: Find Dockerfiles
        id: dockerfiles
        uses: ./.github/actions/find-dockerfiles

  docker:
    name: "Build Docker"
    runs-on: ubuntu-24.04-arm
    needs: [prepare-docker, release]
    if: needs.release.outputs.release-version != ''
    permissions:
      packages: write
    strategy:
      matrix:
        dockerfile: ${{ fromJSON(needs.prepare-docker.outputs.dockerfiles) }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Docker
        uses: ./.github/actions/setup-docker

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Artifact
        uses: actions/download-artifact@v6
        with:
          name: package.tgz
          path: apps/home-assistant-matter-hub/
          merge-multiple: true

      - name: Build Docker
        uses: ./.github/actions/docker
        with:
          push: true
          channel: testing
          dockerfile: ${{ matrix.dockerfile }}
          package-version: ${{ needs.release.outputs.release-version }}

  npm-publish:
    name: "Publish to npm"
    runs-on: ubuntu-latest
    needs: [release]
    if: needs.release.outputs.release-version != ''
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Environment
        uses: ./.github/actions/setup-node

      - name: Download Package
        uses: actions/download-artifact@v6
        with:
          name: package.tgz
          path: apps/home-assistant-matter-hub/
          merge-multiple: true

      - name: Repack as @riddix/hamh
        run: |
          cd apps/home-assistant-matter-hub
          mkdir -p repack && tar xzf package.tgz -C repack
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('repack/package/package.json','utf8'));
            pkg.name = '@riddix/hamh';
            pkg.repository = 'github:RiDDiX/home-assistant-matter-hub';
            fs.writeFileSync('repack/package/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          cd repack && tar czf ../package-npm.tgz package && cd ..
          rm -rf repack

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish apps/home-assistant-matter-hub/package-npm.tgz --provenance --no-git-checks --access public --tag testing

  dispatch-addon:
    name: "Dispatch Addon Repository"
    runs-on: ubuntu-latest
    needs: [release, docker]
    if: needs.release.outputs.release-version != ''
    steps:
      - name: Dispatch Addon Repository
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.ADDON_REPOSITORY_PAT }}
          repository: "riddix/home-assistant-addons"
          event-type: release
          client-payload: |
            {
              "project": "hamh",
              "channel": "testing",
              "version": "${{needs.release.outputs.release-version}}",
              "changelogUrl": "https://github.com/${{github.repository}}/releases/download/v${{needs.release.outputs.release-version}}/CHANGELOG_FULL.md"
            }
